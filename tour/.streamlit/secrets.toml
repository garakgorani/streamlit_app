import streamlit as st
from streamlit_folium import st_folium
import plotly.express as px

from api import get_festival
from map import create_map
from utils import random_festival

# 1. 페이지 설정
st.set_page_config(page_title="Festival Finder Korea", layout="wide")
st.title("🎉 대한민국 축제 찾기")

# 2. 검색창 레이아웃
col1, col2, col3 = st.columns([4, 4, 2]) # 비율 조절로 버튼 크기 최적화

with col1:
    keyword = st.text_input("축제 검색")

with col2:
    areas = {
        "전국":"", "서울":"1", "인천":"2", "대전":"3", "대구":"4", "광주":"5", "부산":"6", "울산":"7",
        "세종":"8", "경기":"31", "강원":"32", "충북":"33", "충남":"34", "경북":"35", "경남":"36", "전북":"37", "전남":"38", "제주":"39"
    }
    area_name = st.selectbox("지역", list(areas.keys()))
    area = areas[area_name]

with col3:
    # 버튼 세로 정렬을 위한 여백 후 버튼 배치
    st.write("#") 
    search = st.button("검색", use_container_width=True)

# Session State 초기화
if "festival_df" not in st.session_state:
    st.session_state.festival_df = None

# 검색 버튼 클릭 시 데이터 로드 및 저장
if search:
    with st.spinner("축제 정보를 가져오는 중입니다..."):
        df = get_festival(area, keyword)
        st.session_state.festival_df = df

# 검색 결과가 존재할 때만 화면에 표시
if st.session_state.festival_df is not None:
    df = st.session_state.festival_df
    
    if df.empty:
        st.warning("검색 결과가 없습니다. 다른 키워드로 검색해보세요!")
    else:
        st.success(f"{len(df)}개의 축제를 찾았습니다.")

        # 시각화 및 탭 레이아웃
        fig = px.histogram(df, x="addr1", title="지역별 축제 개수")
        st.plotly_chart(fig, use_container_width=True)

        tab1, tab2 = st.tabs(["목록", "지도"])

        with tab1:
            for _, row in df.iterrows():
                st.subheader(row["title"])
                st.write(f"📍 주소: {row['addr1']}")
                st.write(f"📅 기간: {row['eventstartdate']} ~ {row['eventenddate']}")
                if row.get("firstimage"):
                    st.image(row["firstimage"], width=300)
                st.divider()

        with tab2:
            st_folium(create_map(df), width=1200, height=600)
            
        # 랜덤 축제 버튼을 결과 화면 하단에 독립적으로 배치
        st.write("---")
        if st.button("🎲 오늘의 랜덤 축제 추천받기"):
            festival = random_festival(df)
            if festival is not None:
                st.balloons()
                st.info(f"✨ 추천 축제: **{festival['title']}**")
                st.write(f"📍 위치: {festival['addr1']}")
