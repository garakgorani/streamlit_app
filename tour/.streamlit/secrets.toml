TOUR_API_KEY = "ca2e24cc274f4760dac474033726f586637667423b8c6fd1a185c044661ff15c"
import streamlit as st
import requests
import pandas as pd
from datetime import datetime
import random
from streamlit_folium import st_folium
import folium

# 페이지 기본 설정
st.set_page_config(page_title="🎉 전국 축제 방방곡곡", page_icon="⛺", layout="wide")

# 1. API 키 보안 로드 (Streamlit Secrets 사용)
# 로컬 테스트 시에는 .streamlit/secrets.toml에, 클라우드 배포 시에는 Advanced Settings에 설정합니다.
try:
    API_KEY = st.secrets["tour_api"]["api_key"]
except Exception:
    st.error("⚠️ API 키가 설정되지 않았습니다. Streamlit Secrets 설정을 확인해주세요.")
    st.stop()

BASE_URL = "https://apis.data.go.kr/B551011/KorService1/searchFestival1"

# 지역 코드 매핑 (한국관광공사 표준 지역코드)
AREA_CODES = {
    "전체": "", "서울": "1", "인천": "2", "대전": "3", "대구": "4", 
    "광주": "5", "부산": "6", "울산": "7", "세종": "8", "경기": "31", 
    "강원": "32", "충북": "33", "충남": "34", "경북": "35", "경남": "36", 
    "전북": "37", "전남": "38", "제주": "39"
}

# 2. API 데이터 호출 함수
@st.cache_data(ttl=3600)  # 1시간 동안 API 결과 캐싱하여 속도 개선
def fetch_festivals(area_code, start_date):
    params = {
        "serviceKey": API_KEY,
        "numOfRows": 100,
        "pageNo": 1,
        "MobileOS": "ETC",
        "MobileApp": "FestivalApp",
        "_type": "json",
        "listYN": "Y",
        "arrange": "A", # 제목순 정렬
        "eventStartDate": start_date
    }
    if area_code:
        params["areaCode"] = area_code

    try:
        response = requests.get(BASE_URL, params=params, timeout=10)
        res_json = response.json()
        items = res_json['response']['body']['items']['item']
        
        # 데이터프레임 변환 및 정제
        df = pd.DataFrame(items)
        # 필요한 컬럼만 추출 및 이름 변경
        rename_dict = {
            'title': '축제명', 'addr1': '주소', 'eventstartdate': '시작일', 
            'eventenddate': '종료일', 'firstimage': '이미지', 
            'mapx': '경도', 'mapy': '위도', 'tel': '문의처'
        }
        df = df.rename(columns=rename_dict)
        # 지도 시각화를 위해 위경도 타입을 숫자형으로 변환
        df['경도'] = pd.to_numeric(df['경도'], errors='coerce')
        df['위도'] = pd.to_numeric(df['위도'], errors='coerce')
        return df
    except Exception as e:
        return pd.DataFrame() # 에러 발생 시 빈 데이터프레임 반환

# UI 구성
st.title("🎉 전국 축제 방방곡곡 내비게이터")
st.caption("한국관광공사 OpenAPI 데이터를 실시간으로 조회하여 전국의 핫한 축제를 찾아드립니다.")

# 사이드바 필터 설정
st.sidebar.header("🔍 축제 필터링")
selected_area = st.sidebar.selectbox("지역 선택", list(AREA_CODES.keys()))
today_str = datetime.today().strftime("%Y%m%d")

# 데이터 가져오기
area_code = AREA_CODES[selected_area]
df_festivals = fetch_festivals(area_code, today_str)

if df_festivals.empty:
    st.warning("현재 조건으로 조회된 축제 정보가 없습니다.")
else:
    # --- 재미있는 기능: 복불복 축제 뽑기 ---
    st.subheader("🎲 이번 주말엔 어디 갈까? 복불복 축제 룰렛!")
    if st.button("🚀 무작위 축제 추천받기"):
        random_idx = random.randint(0, len(df_festivals) - 1)
        picked = df_festivals.iloc[random_idx]
        
        col1, col2 = st.columns([1, 2])
        with col1:
            if pd.notna(picked.get('이미지')) and picked['이미지'] != "":
                st.image(picked['이미지'], use_container_width=True)
            else:
                st.image("https://via.placeholder.com/300x200?text=No+Image", use_container_width=True)
        with col2:
            st.markdown(f"### 📍 오늘의 추천: **{picked['축제명']}**")
            st.write(f"📅 **기간:** {picked['시작일']} ~ {picked['종료일']}")
            st.write(f"🏠 **장소:** {picked['주소']}")
            if '문의처' in picked and picked['문의처']:
                st.write(f"📞 **문의:** {picked['문의처']}")
            st.balloons()
            
    st.markdown("---")
    
    # 기본 레이아웃 분할 (좌측: 지도 및 목록, 우측: 상세 데이터)
    st.subheader(f"📍 {selected_area} 지역 진행/예정 축제 목록 (총 {len(df_festivals)}건)")
    
    # 지도가 올바르게 표시될 수 있도록 위경도 데이터 유효성 검사
    df_map = df_festivals.dropna(subset=['위도', '경도'])
    
    if not df_map.empty:
        # 중심점 계산
        center_lat = df_map['위도'].mean()
        center_lon = df_map['경도'].mean()
        
        m = folium.Map(location=[center_lat, center_lon], zoom_start=8)
        
        for _, row in df_map.iterrows():
            popup_html = f"<b>{row['축제명']}</b><br>{row['시작일']}~{row['종료일']}<br>{row['주소']}"
            folium.Marker(
                location=[row['위도'], row['경도']],
                popup=folium.Popup(popup_html, max_width=300),
                tooltip=row['축제명']
            ).add_to(m)
            
        st_folium(m, width="100%", height=400, key="festival_map")
    
    # 데이터 테이블 표시
    display_cols = ['축제명', '시작일', '종료일', '주소']
    st.dataframe(df_festivals[display_cols], use_container_width=True)
